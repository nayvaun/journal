<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>my journal</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="dot"></div>
    <h1 id="headerTitle">my journal</h1>
  </div>

  <div class="top-actions">
    <button id="homeBtn" class="btn">Home</button>
    <button id="newJournalBtn" class="btn">New journal</button>

    <div class="divider"></div>

    <button id="newEntryBtn" class="btn">New entry</button>
    <button id="saveBtn" class="btn primary">Save</button>
    <button id="deleteEntryBtn" class="btn danger">Delete entry</button>

    <div class="divider"></div>

    <button id="renameJournalBtn" class="btn">Rename journal</button>
  </div>
</header>

<main class="layout">

  <aside class="sidebar">
    <input id="searchInput" class="search" placeholder="Search..." />
    <div id="list" class="list"></div>
  </aside>

  <section class="editor">

    <div id="homePanel">
      <h2>Home</h2>
      <p>Select a journal or create a new one.</p>
    </div>

    <div id="editorPanel" style="display:none;">
      <input id="titleInput" class="title" placeholder="Title" />
      <input id="dateInput" class="date" type="text" placeholder="Date (type anything)" />
      <textarea id="bodyInput" class="body" placeholder="Start writing..."></textarea>
      <div class="status">
        <span id="statusText">Ready.</span>
      </div>
    </div>

  </section>

</main>

<!-- Custom popup (modal) -->
<div id="modalOverlay" class="modalOverlay" style="display:none;">
  <div class="modal">
    <div class="modalTitle" id="modalTitle">Title</div>
    <div class="modalBody">
      <input id="modalInput" class="modalInput" type="text" />
      <div class="modalActions">
        <button id="modalCancel" class="btn">Cancel</button>
        <button id="modalOk" class="btn primary">OK</button>
      </div>
      <div class="modalHint" id="modalHint"></div>
    </div>
  </div>
</div>

  
<script src="./app.js"></script>
</body>
</html>
