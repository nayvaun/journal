<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>my journal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="dot"></div>
      <h1 id="headerTitle">my journal</h1>
    </div>

    <div class="top-actions">
      <button id="homeBtn" class="btn">Home</button>
      <button id="newJournalBtn" class="btn">New journal</button>

      <div class="divider"></div>

      <button id="newEntryBtn" class="btn">New entry</button>
      <button id="saveBtn" class="btn primary">Save</button>
      <button id="deleteEntryBtn" class="btn danger">Delete entry</button>

      <div class="divider"></div>

      <button id="renameJournalBtn" class="btn">Rename journal</button>

      <div class="divider"></div>

      <button id="exportBtn" class="btn">Export</button>
      <label class="btn file">
        Import
        <input id="importInput" type="file" accept="application/json" />
      </label>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="search-wrap">
        <input id="searchInput" class="search" placeholder="Search..." />
      </div>

      <div id="list" class="list"></div>

      <p class="hint">
        Saved on <b>this Mac + this browser</b>. Use Export for backups.
      </p>
    </aside>
