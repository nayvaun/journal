<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>my journal</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="dot"></div>
    <h1>my journal</h1>
  </div>

  <div class="top-actions">
    <button id="homeBtn" class="btn">Home</button>
    <button id="newJournalBtn" class="btn">New journal</button>

    <div class="divider"></div>

    <button id="deleteJournalBtn" class="btn danger">Delete journal</button>

    <div class="divider"></div>

    <button id="newEntryBtn" class="btn">New entry</button>
    <button id="saveBtn" class="btn primary">Save</button>
    <button id="deleteEntryBtn" class="btn danger">Delete entry</button>
  </div>
</header>

<main class="layout">

  <aside class="sidebar">
    <input id="searchInput" class="search" placeholder="Search..." />
    <div id="list" class="list"></div>
  </aside>

  <section class="editor">

    <div id="homePanel">
      <h2>Home</h2>
      <p>Select a journal on the left, or make a new one.</p>
    </div>

    <div id="editorPanel" class="hidden">
      <input id="journalTitleInput" class="journalTitle" placeholder="Journal name" />

      <input id="titleInput" class="title" placeholder="Entry title" />
      <input id="dateInput" class="date" type="text" placeholder="Date (type anything)" />
      <textarea id="bodyInput" class="body" placeholder="Start writing..."></textarea>

      <div class="status">
        <span id="statusText">Ready.</span>
      </div>
    </div>

  </section>

</main>

<script src="./app.js"></script>
</body>
</html>
